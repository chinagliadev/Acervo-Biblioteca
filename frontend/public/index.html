<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../src/assets/login.css">
</head>

<body class="bg-acervo">
    <main class="container-fluid">
        <div class="row">
            <div class="col-12 col-sm-5 p-0">
                <div class="container_formulario">
                    <form class="form_login">
                        <h1>Login</h1>
                        <p>Estamos felizes em ter você aqui. Entre com suas credenciais para acessar o sistema com
                            segurança e praticidade</p>
                        <div class="mb-3">
                            <label class="form-label" for="txtEmail">Email</label>
                            <input type="text" id="txtEmail" class="formulario_input" placeholder="Exemplo@gmail.com"
                                autocomplete="off">
                            <div class="invalid-feedback">Email inválido</div>
                        </div>


                        <div class="mb-3">
                            <label class="form-label" for="txtSenha">Senha</label>
                            <input type="password" id="txtSenha" class="formulario_input"
                                placeholder="*******************" autocomplete="off">
                            <div class="invalid-feedback">Senha inválida</div>
                        </div>
                        <div class="mb-3">
                            <button type="button" id="btnLogin" class="button-acervo">Entrar</button>
                        </div>
                        <hr class="text-muted">
                        <div class="mb-3 text-center">
                            <span>Não possui conta ? <a href="../public/cadastro.html"
                                    class="text-reset text-decoration-none text-success fw-bold">Clique
                                    Aqui</a></span>
                        </div>

                    </form>
                </div>
            </div>
            <div class="col-12 col-sm-7 p-0 ">
                <div class="background-login-img">
                    <div class="login-texto">
                        <h2>Seu sistema, sua produtividade</h2>
                        <p>Gerencie empréstimos, organize o acervo e facilite o acesso ao conhecimento.</p>
                    </div>
                    <div class="login-logo">ACERVO</div>
                </div>
            </div>
        </div>
    </main>
    <script src="../src/assets/js/login.js"></script>
</body>

</html>
